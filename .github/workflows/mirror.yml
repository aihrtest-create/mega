name: Mirror to GitLab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror-to-gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Загружаем всю историю коммитов, чтобы пуш прошел успешно

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITLAB_TOKEN}" ]; then
            echo "GITLAB_TOKEN is empty. Add it in GitHub repository secrets."
            exit 1
          fi

          echo "GitHub commit: $(git rev-parse HEAD)"

          # Настраиваем адрес GitLab с использованием токена авторизации
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.com/hp-tools/mega.git

          echo "GitLab main before push:"
          git ls-remote gitlab refs/heads/main || true

          # Отправляем текущий commit в GitLab. Не используем --force:
          # protected main в корпоративном GitLab часто запрещает force-push.
          git push gitlab HEAD:main

          echo "GitLab main after push:"
          git ls-remote gitlab refs/heads/main
