# Этот файл нужен, чтобы GitLab распознал проект как CI-проект.
# Фактический деплой происходит автоматически: сервер Hello Park
# делает git pull при получении пуша, и nginx раздаёт dist/.
#
# Пайплайн ниже просто проверяет, что проект собирается без ошибок.

stages:
  - build

build_check:
  stage: build
  image: node:22-alpine
  only:
    - main
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
