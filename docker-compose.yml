version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL, по которому фронтенд будет стучаться к бэкенду.
        # Оставьте пустым (или просто слэш), чтобы Nginx сам проксировал запросы на /api/
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "3002"
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
    environment:
      - NODE_ENV=production
    env_file:
      - ./server/.env
    restart: unless-stopped
